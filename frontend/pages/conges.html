<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HorizonR — Congés</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="app-layout">
      <div id="sidebar-container"></div>

      <div class="main-content">
        <header class="topbar">
          <span class="topbar-title">Gestion des congés</span>
        </header>

        <main class="page-content">
          <div class="page-header">
            <div>
              <h1>Congés</h1>
              <p id="conges-subtitle">Demandes et validation des congés</p>
            </div>
            <button class="btn btn-primary" id="btn-nouveau-conge">
              + Nouvelle demande
            </button>
          </div>

          <!-- Filtres -->
          <div class="card mb-2">
            <div class="card-body">
              <div class="form-grid">
                <div class="form-group" style="margin: 0">
                  <select class="form-control" id="filtre-statut">
                    <option value="">Tous les statuts</option>
                    <option value="EN_ATTENTE">En attente</option>
                    <option value="VALIDE">Validé</option>
                    <option value="REFUSE">Refusé</option>
                  </select>
                </div>
                <div class="form-group" style="margin: 0">
                  <select class="form-control" id="filtre-type">
                    <option value="">Tous les types</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <!-- Tableau -->
          <div class="card">
            <div class="card-header">
              <span class="card-title" id="nb-conges">Congés</span>
            </div>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th id="col-employe-header" class="hidden">Employé</th>
                    <th>Type</th>
                    <th>Du</th>
                    <th>Au</th>
                    <th>Jours</th>
                    <th>Motif</th>
                    <th>Statut</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="tbody-conges">
                  <tr>
                    <td colspan="8" class="text-center text-muted">
                      Chargement…
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- Modal demande de congé -->
    <div class="modal-overlay" id="modal-conge">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">Nouvelle demande de congé</span>
          <button class="btn btn-icon btn-outline" id="btn-fermer-modal-conge">
            ✕
          </button>
        </div>
        <div class="modal-body">
          <form id="form-conge">
            <div class="form-group">
              <label class="form-label">Type de congé *</label>
              <select class="form-control" id="conge-type" required></select>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Date de début *</label>
                <input
                  class="form-control"
                  type="date"
                  id="conge-debut"
                  required
                />
              </div>
              <div class="form-group">
                <label class="form-label">Date de fin *</label>
                <input
                  class="form-control"
                  type="date"
                  id="conge-fin"
                  required
                />
              </div>
            </div>
            <div class="form-group">
              <p class="text-small text-muted">
                Jours ouvrés calculés : <strong id="nb-jours-calc">—</strong>
              </p>
            </div>
            <div class="form-group">
              <label class="form-label">Motif</label>
              <textarea
                class="form-control"
                id="conge-motif"
                rows="3"
                placeholder="Précision (optionnel)…"
              ></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" id="btn-annuler-conge">
            Annuler
          </button>
          <button class="btn btn-primary" id="btn-soumettre-conge">
            Soumettre la demande
          </button>
        </div>
      </div>
    </div>

    <!-- Modal décision (ADMIN/MANAGER) -->
    <div class="modal-overlay" id="modal-decision">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="modal-decision-titre"
            >Traiter la demande</span
          >
          <button
            class="btn btn-icon btn-outline"
            id="btn-fermer-modal-decision"
          >
            ✕
          </button>
        </div>
        <div class="modal-body">
          <p id="decision-recap" class="mb-2 text-small"></p>
          <div class="form-group">
            <label class="form-label">Commentaire (optionnel)</label>
            <textarea
              class="form-control"
              id="decision-commentaire"
              rows="3"
            ></textarea>
          </div>
          <input type="hidden" id="decision-conge-id" />
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" id="btn-fermer-decision">
            Annuler
          </button>
          <button class="btn btn-danger" id="btn-refuser-conge">Refuser</button>
          <button class="btn btn-success" id="btn-valider-conge">
            Valider
          </button>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>

    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/conges.js"></script>
  </body>
</html>
